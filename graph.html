<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mogged — Project Knowledge Graph</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface-2: #1a2236;
    --border: #1e293b;
    --text: #e2e8f0;
    --text-soft: #94a3b8;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,.25);
    --green: #10b981;
    --amber: #f59e0b;
    --rose: #f43f5e;
    --cyan: #06b6d4;
    --violet: #8b5cf6;
    --pink: #ec4899;
    --orange: #f97316;
    --teal: #14b8a6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* ─── Header ─── */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    background: rgba(10,14,26,.85);
    backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px; color: #fff;
    box-shadow: 0 0 24px rgba(99,102,241,.35);
  }
  .header h1 {
    font-size: 18px; font-weight: 700; letter-spacing: -.3px;
    background: linear-gradient(90deg, #e2e8f0, #94a3b8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text-soft);
  }
  .badge .dot { width: 7px; height: 7px; border-radius: 50%; }

  /* ─── Canvas ─── */
  #graph-canvas {
    width: 100%; height: 100%;
    position: absolute; top: 0; left: 0;
    cursor: grab;
  }
  #graph-canvas:active { cursor: grabbing; }

  /* ─── Legend ─── */
  .legend {
    position: fixed; bottom: 24px; left: 24px; z-index: 100;
    background: rgba(17,24,39,.92); backdrop-filter: blur(16px);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 22px; min-width: 220px;
  }
  .legend h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .12em;
    color: var(--text-soft); margin-bottom: 12px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 0; font-size: 13px; color: var(--text-soft);
  }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }

  /* ─── Stats Panel ─── */
  .stats {
    position: fixed; bottom: 24px; right: 24px; z-index: 100;
    display: flex; gap: 10px;
  }
  .stat-card {
    background: rgba(17,24,39,.92); backdrop-filter: blur(16px);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 18px; text-align: center; min-width: 90px;
  }
  .stat-card .val {
    font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-card .label {
    font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--text-soft); margin-top: 4px;
  }

  /* ─── Tooltip ─── */
  .tooltip {
    position: fixed; z-index: 200;
    background: rgba(17,24,39,.96); backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px; max-width: 340px;
    pointer-events: none; opacity: 0;
    transform: translateY(6px);
    transition: opacity .2s, transform .2s;
    box-shadow: 0 12px 40px rgba(0,0,0,.4);
  }
  .tooltip.active { opacity: 1; transform: translateY(0); }
  .tooltip h4 {
    font-size: 14px; font-weight: 700; margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .tooltip .tag {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .08em; padding: 3px 8px; border-radius: 6px;
    background: var(--accent); color: #fff;
  }
  .tooltip p {
    font-size: 12.5px; color: var(--text-soft); line-height: 1.5;
    margin: 0;
  }
  .tooltip .conn {
    margin-top: 8px; font-size: 11px; color: var(--text-soft);
    border-top: 1px solid var(--border); padding-top: 8px;
  }

  /* ─── Controls ─── */
  .controls {
    position: fixed; top: 76px; right: 24px; z-index: 100;
    display: flex; flex-direction: column; gap: 6px;
  }
  .ctrl-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(17,24,39,.92); backdrop-filter: blur(16px);
    border: 1px solid var(--border); color: var(--text-soft);
    font-size: 18px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all .2s;
  }
  .ctrl-btn:hover { background: var(--surface-2); color: #fff; border-color: var(--accent); }

  /* ─── Search ─── */
  .search-bar {
    position: fixed; top: 76px; left: 24px; z-index: 100;
  }
  .search-bar input {
    background: rgba(17,24,39,.92); backdrop-filter: blur(16px);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 16px 10px 40px; color: var(--text);
    font-size: 13px; font-family: inherit; width: 260px;
    outline: none; transition: border-color .2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar::before {
    content: "⌕"; position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%); font-size: 16px; color: var(--text-soft);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-mark">M</div>
    <h1>Mogged — Project Knowledge Graph</h1>
  </div>
  <div class="header-right">
    <span class="badge"><span class="dot" style="background:var(--green)"></span> Interactive</span>
    <span class="badge"><span class="dot" style="background:var(--amber)"></span> AI Interview Coach</span>
  </div>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search nodes…" autocomplete="off"/>
</div>

<div class="controls">
  <button class="ctrl-btn" onclick="zoomIn()" title="Zoom In">+</button>
  <button class="ctrl-btn" onclick="zoomOut()" title="Zoom Out">−</button>
  <button class="ctrl-btn" onclick="resetView()" title="Reset">⟳</button>
</div>

<canvas id="graph-canvas"></canvas>

<div class="legend">
  <h3>Node Categories</h3>
  <div class="legend-item"><span class="legend-dot" style="background:#6366f1"></span> Backend Core</div>
  <div class="legend-item"><span class="legend-dot" style="background:#ec4899"></span> AI Agents</div>
  <div class="legend-item"><span class="legend-dot" style="background:#06b6d4"></span> Frontend Pages</div>
  <div class="legend-item"><span class="legend-dot" style="background:#10b981"></span> Frontend Components</div>
  <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span> State / Hooks</div>
  <div class="legend-item"><span class="legend-dot" style="background:#f97316"></span> Data Layer</div>
  <div class="legend-item"><span class="legend-dot" style="background:#f43f5e"></span> External Services</div>
  <div class="legend-item"><span class="legend-dot" style="background:#8b5cf6"></span> Database Tables</div>
</div>

<div class="stats">
  <div class="stat-card"><div class="val" id="stat-nodes">0</div><div class="label">Nodes</div></div>
  <div class="stat-card"><div class="val" id="stat-edges">0</div><div class="label">Edges</div></div>
  <div class="stat-card"><div class="val" id="stat-communities">0</div><div class="label">Communities</div></div>
</div>

<div class="tooltip" id="tooltip">
  <h4><span id="tt-name"></span> <span class="tag" id="tt-tag"></span></h4>
  <p id="tt-desc"></p>
  <div class="conn" id="tt-conn"></div>

  { from: 'pg_setup',          to: 'c_persona_card',   label: 'renders' },
  { from: 'pg_shadow',         to: 'c_shadow_replay',  label: 'renders' },
  { from: 'pg_report',         to: 'c_score_ring',     label: 'renders' },
  { from: 'pg_report',         to: 'c_confidence',     label: 'renders' },
  { from: 'pg_report',         to: 'c_filler_chart',   label: 'renders' },
  { from: 'pg_report',         to: 'c_report_chatbot', label: 'renders' },

  // Pages → Hooks/State
  { from: 'pg_interview',      to: 'h_websocket',      label: 'uses' },
  { from: 'pg_interview',      to: 'h_voice',          label: 'uses' },
  { from: 'pg_interview',      to: 's_interview',      label: 'reads/writes' },
  { from: 'pg_auth',           to: 'h_auth',           label: 'uses' },
  { from: 'pg_dashboard',      to: 'h_auth',           label: 'uses' },
  { from: 'pg_setup',          to: 's_session',        label: 'writes' },

  // Hooks → External
  { from: 'h_websocket',       to: 'socket_io',        label: 'Socket.IO WS' },
  { from: 'h_auth',            to: 'ext_supabase',     label: 'Supabase Auth' },
  { from: 'c_webcam',          to: 'ext_mediapipe',    label: 'face detection' },

  // API layer
  { from: 'pg_setup',          to: 'd_api',            label: 'createInterview' },
  { from: 'pg_report',         to: 'd_api',            label: 'getReport' },
  { from: 'pg_shadow',         to: 'd_api',            label: 'getShadowTranscript' },
  { from: 'pg_history',        to: 'd_api',            label: 'getHistory' },
  { from: 'c_report_chatbot',  to: 'd_api',            label: 'askReportQuestion' },
  { from: 'd_api',             to: 'd_supabase_fe',    label: 'auth interceptor' },
  { from: 'd_supabase_fe',     to: 'ext_supabase',     label: 'connects' },

  // API → Backend routes
  { from: 'd_api',             to: 'router_auth',       label: '/api/auth' },
  { from: 'd_api',             to: 'router_resume',     label: '/api/resume' },
  { from: 'd_api',             to: 'router_interview',  label: '/api/interview' },
  { from: 'd_api',             to: 'router_report',     label: '/api/report' },
  { from: 'd_api',             to: 'router_history',    label: '/api/history' },

  // VoiceInput → wave
  { from: 'c_voice_input',     to: 'c_wave',           label: 'renders' },

  // Navbar
  { from: 'pg_dashboard',      to: 'c_navbar',         label: 'renders' },
  { from: 'pg_history',        to: 'c_navbar',         label: 'renders' },

// ──────────────────────────────────────────────────────────────────────────
// Force-Directed Graph Engine (Canvas 2D)
// ──────────────────────────────────────────────────────────────────────────

const canvas = document.getElementById('graph-canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

let W, H, dpr;
let scale = 1, panX = 0, panY = 0;
let dragging = null, dragOffX = 0, dragOffY = 0;
let isPanning = false, panStartX = 0, panStartY = 0;
let hovered = null;
let searchTerm = '';

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Index nodes
const nodeMap = {};
nodes.forEach((n, i) => {
  n.x = W/2 + (Math.random() - .5) * 600;
  n.y = H/2 + (Math.random() - .5) * 400;
  n.vx = 0; n.vy = 0;
  n.connections = 0;
  nodeMap[n.id] = n;
});

// Count connections
edges.forEach(e => {
  if (nodeMap[e.from]) nodeMap[e.from].connections++;
  if (nodeMap[e.to]) nodeMap[e.to].connections++;
});

// Update stats
document.getElementById('stat-nodes').textContent = nodes.length;
document.getElementById('stat-edges').textContent = edges.length;
document.getElementById('stat-communities').textContent = Object.keys(CATEGORIES).length;

// ── Physics ──
const REPULSION = 4000;
const SPRING_K = 0.008;
const SPRING_LEN = 160;
const DAMPING = 0.88;
const CENTER_GRAVITY = 0.0003;

function simulate() {
  // Repulsion between all pairs
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx*dx + dy*dy) || 1;
      let force = REPULSION / (dist * dist);
      let fx = dx / dist * force, fy = dy / dist * force;
      a.vx -= fx; a.vy -= fy;
      b.vx += fx; b.vy += fy;
    }
  }
  // Spring attraction along edges
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    let dx = b.x - a.x, dy = b.y - a.y;
    let dist = Math.sqrt(dx*dx + dy*dy) || 1;
    let force = (dist - SPRING_LEN) * SPRING_K;
    let fx = dx / dist * force, fy = dy / dist * force;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  });
  // Center gravity
  nodes.forEach(n => {
    n.vx += (W/2 - n.x) * CENTER_GRAVITY;
    n.vy += (H/2 - n.y) * CENTER_GRAVITY;
  });
  // Integrate
  nodes.forEach(n => {
    if (n === dragging) return;
    n.vx *= DAMPING; n.vy *= DAMPING;
    n.x += n.vx; n.y += n.vy;
  });
}

// ── Rendering ──
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(scale, scale);

  // Draw edges
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    const isHighlighted = hovered && (hovered.id === e.from || hovered.id === e.to);
    const isSearchDim = searchTerm && !(matchSearch(a) || matchSearch(b));
    
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = isSearchDim
      ? 'rgba(30,41,59,.15)'
      : isHighlighted
        ? 'rgba(99,102,241,.6)'
        : 'rgba(30,41,59,.4)';
    ctx.lineWidth = isHighlighted ? 2 : 1;
    ctx.stroke();

    // Arrow
    if (isHighlighted) {
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      const angle = Math.atan2(b.y - a.y, b.x - a.x);
      ctx.save();
      ctx.translate(mx, my);
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(6, 0);
      ctx.lineTo(-4, -4);
      ctx.lineTo(-4, 4);
      ctx.closePath();
      ctx.fillStyle = 'rgba(99,102,241,.7)';
      ctx.fill();
      ctx.restore();
      
      // Edge label
      ctx.save();
      ctx.translate(mx, my - 8);
      ctx.font = '9px Inter, sans-serif';
      ctx.fillStyle = 'rgba(148,163,184,.8)';
      ctx.textAlign = 'center';
      ctx.fillText(e.label, 0, 0);
      ctx.restore();
    }
  });

  // Draw nodes
  nodes.forEach(n => {
    const cat = CATEGORIES[n.cat];
    const isHov = hovered === n;
    const isConnected = hovered && isNeighbor(hovered, n);
    const isSearchMatch = searchTerm && matchSearch(n);
    const isSearchDim = searchTerm && !matchSearch(n) && !isSearchNeighbor(n);
    const r = (n.size / 2) * (isHov ? 1.3 : 1);

    // Glow
    if (isHov || isSearchMatch) {
      const grd = ctx.createRadialGradient(n.x, n.y, r, n.x, n.y, r * 3);
      grd.addColorStop(0, cat.color + '40');
      grd.addColorStop(1, cat.color + '00');
      ctx.beginPath();
      ctx.arc(n.x, n.y, r * 3, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    const alpha = isSearchDim ? '30' : (isHov || isConnected ? 'ff' : 'cc');
    ctx.fillStyle = cat.color + alpha;
    ctx.fill();

    if (isHov) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    } else if (isConnected) {
      ctx.strokeStyle = cat.color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Label
    const showLabel = isHov || isConnected || isSearchMatch || (!searchTerm && scale > 0.6) || n.size >= 28;
    if (showLabel && !isSearchDim) {
      ctx.font = `${isHov ? '600' : '500'} ${isHov ? 12 : 10}px Inter, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = isSearchDim ? 'rgba(148,163,184,.3)' : 'rgba(226,232,240,.9)';
      ctx.fillText(n.label, n.x, n.y + r + 14);
    }
  });

  ctx.restore();
}

function matchSearch(n) {
  if (!searchTerm) return false;
  return n.label.toLowerCase().includes(searchTerm) ||
         n.desc.toLowerCase().includes(searchTerm) ||
         n.cat.toLowerCase().includes(searchTerm);
}

function isSearchNeighbor(n) {
  if (!searchTerm) return false;
  return edges.some(e => {
    const other = e.from === n.id ? nodeMap[e.to] : (e.to === n.id ? nodeMap[e.from] : null);
    return other && matchSearch(other);
  });
}

function isNeighbor(a, b) {
  return edges.some(e =>
    (e.from === a.id && e.to === b.id) ||
    (e.to === a.id && e.from === b.id)
  );
}

function getConnections(n) {
  const conns = [];
  edges.forEach(e => {
    if (e.from === n.id) conns.push({ dir: '→', node: nodeMap[e.to]?.label || e.to, label: e.label });
    if (e.to === n.id) conns.push({ dir: '←', node: nodeMap[e.from]?.label || e.from, label: e.label });
  });
  return conns;
}

// ── Interaction ──
function screenToWorld(sx, sy) {
  return { x: (sx - panX) / scale, y: (sy - panY) / scale };
}

function nodeAt(mx, my) {
  const { x, y } = screenToWorld(mx, my);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const r = n.size / 2;
    const dx = n.x - x, dy = n.y - y;
    if (dx*dx + dy*dy < (r+6)*(r+6)) return n;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  const n = nodeAt(e.clientX, e.clientY);
  if (n) {
    dragging = n;
    const wp = screenToWorld(e.clientX, e.clientY);
    dragOffX = n.x - wp.x;
    dragOffY = n.y - wp.y;
  } else {
    isPanning = true;
    panStartX = e.clientX - panX;
    panStartY = e.clientY - panY;
  }
});

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    const wp = screenToWorld(e.clientX, e.clientY);
    dragging.x = wp.x + dragOffX;
    dragging.y = wp.y + dragOffY;
    dragging.vx = 0; dragging.vy = 0;
  } else if (isPanning) {
    panX = e.clientX - panStartX;
    panY = e.clientY - panStartY;
  } else {
    const n = nodeAt(e.clientX, e.clientY);
    hovered = n;
    canvas.style.cursor = n ? 'pointer' : 'grab';
    
    if (n) {
      const conns = getConnections(n);
      document.getElementById('tt-name').textContent = n.label;
      document.getElementById('tt-tag').textContent = CATEGORIES[n.cat].label;
      document.getElementById('tt-tag').style.background = CATEGORIES[n.cat].color;
      document.getElementById('tt-desc').textContent = n.desc;
      document.getElementById('tt-conn').innerHTML =
        `<strong>${conns.length} connections:</strong> ` +
        conns.slice(0, 8).map(c => `${c.dir} ${c.node}`).join(', ') +
        (conns.length > 8 ? ` +${conns.length - 8} more` : '');
      
      tooltip.style.left = Math.min(e.clientX + 16, W - 360) + 'px';
      tooltip.style.top = Math.min(e.clientY + 16, H - 200) + 'px';
      tooltip.classList.add('active');
    } else {
      tooltip.classList.remove('active');
    }
  }
});

canvas.addEventListener('mouseup', () => {
  dragging = null; isPanning = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zf = e.deltaY > 0 ? 0.92 : 1.08;
  const mx = e.clientX, my = e.clientY;
  panX = mx - (mx - panX) * zf;
  panY = my - (my - panY) * zf;
  scale *= zf;
  scale = Math.max(0.15, Math.min(4, scale));
}, { passive: false });

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
});

function zoomIn() { scale = Math.min(4, scale * 1.25); }
function zoomOut() { scale = Math.max(0.15, scale * 0.8); }
function resetView() { scale = 1; panX = 0; panY = 0; }

// ── Animation Loop ──
let frameCount = 0;
function loop() {
  // Run physics at reduced rate after stabilization
  if (frameCount < 600 || frameCount % 3 === 0) {
    simulate();
  }
  draw();
  frameCount++;
  requestAnimationFrame(loop);
}
loop();
</script>
